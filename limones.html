<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caza Limones</title>
  <link rel="stylesheet" href="limones.css">
  <script src="utils.js"></script>
</head>

<body onload="iniciar()">
  <div class="contenedor">

    <header class="header">
      <div class="logo">
        <img src="Logo blanco.png" alt="KrakeDev Logo">
      </div>
      <h1>🍋 Atrapar Limones</h1>

      <p class="subtitulo">Si del cielo te caen limones...</p>
      <p class="autor">Autor: Santiago Mosquera</p>
    </header>

    <div class="game-wrapper">
      <canvas id="areajuego" width="600" height="400"></canvas>
    </div>

    <div class="panel">
      <div class="stat">
        <span class="label">Puntaje</span>
        <span id="txtPuntaje">0</span>
      </div>

      <div class="stat">
        <span class="label">Vidas</span>
        <span id="txtVidas">3</span>
      </div>
    </div>

    <div class="botones">
      <button onclick="moverIzquierda()">⬅ Izquierda</button>
      <button onclick="moverDerecha()">Derecha ➡</button>
      <button class="reset" onclick="reiniciar()">🔄 Reiniciar</button>
    </div>

  </div>

  <script src="limones.js"></script>
</body>
</html>
